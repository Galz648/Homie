version: 1
meta:
  name: homie-spaces-images
  description: >
    Parallel packages: DO Spaces (staging+production) via Terraform, Spaces
    image upload in FB scrape pipeline, docs — merge onto feat/homie-spaces-images.
  author: looper-homie
  created: 2026-07-18

goal:
  statement: >
    Achieve the goal in inputs/goal.md for the repository at
    /Users/galzafar/Documents/GitHub/Homie by decomposing work into disjoint
    packages. Every package forks from root branch feat/homie-spaces-images
    into its own git worktree under
    /Users/galzafar/Documents/GitHub/homie-worktrees, has non-overlapping
    write_paths within its parallel_group, and a verifiable ac_command. When a
    package's acceptance criteria pass, merge its branch into
    feat/homie-spaces-images and remove its worktree. Produce
    PARALLEL-REPORT.md listing each package id, write_paths, AC command +
    exit evidence, merge commit, and worktree removal confirmation.
  context_sources:
    - file: ./inputs/goal.md
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie status -sb"
      timeout_sec: 60
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie branch --show-current"
      timeout_sec: 60
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie worktree list"
      timeout_sec: 60
    - cmd: "head -120 /Users/galzafar/Documents/GitHub/Homie/docs/workstreams.md"
      timeout_sec: 30
    - cmd: "cat /Users/galzafar/Documents/GitHub/Homie/scrapers/facebook/src/pipeline/images.ts"
      timeout_sec: 30
    - cmd: "cat /Users/galzafar/Documents/GitHub/Homie/infra/terraform/stacks/k3s/volumes.tf"
      timeout_sec: 30
  definition_of_done: >
    plan.md lists >=2 packages with id/deps/parallel_group/worktree/branch/
    write_paths/ac_command; same-group write_paths are disjoint;
    PARALLEL-REPORT.md records every package merged with AC pass evidence and
    worktree removed; feat/homie-spaces-images contains all package changes;
    no open worktrees remain for this loop's package ids (except the optional
    root checkout homie-spaces-images); no TBD placeholders; Spaces keys never
    committed.
  anti_goals:
    - Editing overlapping write_paths in the same parallel_group without a plan revise
    - Force-pushing feat/homie-spaces-images or infra
    - Leaving package worktrees around after a successful merge
    - Declaring a package done without a passing ac_command
    - Committing secrets or filling secrets.example / secrets.auto.tfvars with real values
    - Using DO block volumes as listing photo storage
  verification:
    - id: plan-packages
      type: programmatic
      description: plan.md packages have required fields
      check:
        - python
        - scripts/check-plan-packages.py
        - loop-workspace/plan.md
      expect: exit_zero
    - id: disjoint-paths
      type: programmatic
      description: write_paths disjoint within each parallel_group
      check:
        - python
        - scripts/check-disjoint-paths.py
        - loop-workspace/plan.md
      expect: exit_zero
    - id: report-schema
      type: programmatic
      description: PARALLEL-REPORT.md has per-package merge + AC evidence
      check:
        - python
        - scripts/check-parallel-report.py
        - loop-workspace/PARALLEL-REPORT.md
      expect: exit_zero
    - id: worktrees-cleaned
      type: programmatic
      description: No leftover worktrees for planned package ids
      check:
        - python
        - scripts/check-worktrees-cleaned.py
        - "/Users/galzafar/Documents/GitHub/Homie"
        - loop-workspace/plan.md
      expect: exit_zero
    - id: plan-disjoint-sound
      type: judge
      rubric: >
        Judge plan.md against inputs/goal.md. Every package must be necessary
        for the goal or explicitly deferred; write_paths within each
        parallel_group must be plausibly non-interfering (no shared mutable
        files); deps must not create cycles; each ac_command must actually
        verify that package's outcome. Verdict revise if packages are fake
        splits of the same files, AC is vibes-only, or the root branch /
        worktree protocol is missing.
    - id: merges-complete
      type: judge
      rubric: >
        Judge PARALLEL-REPORT.md and git reality on feat/homie-spaces-images.
        Every planned package that was not explicitly cancelled must show AC
        pass evidence, a merge commit (or ff) onto feat/homie-spaces-images,
        and worktree removal. Verdict revise if merges are missing, AC was
        skipped, or worktrees still exist for package ids.

host:
  cli: claude
  model: default
  invoke: ["claude", "-p"]
  timeout_sec: 1800

council:
  - id: judge-1
    role: judge
    cli: claude
    model: default
    invoke: ["claude", "-p"]
    timeout_sec: 600
    scope: [plan, delivery]
    local: false

gates:
  plan_gate:
    when: after_plan
    members: [judge-1]
    verdict_policy: revise_until_clean
    verdict_source: judge-1
    criteria: [plan-packages, disjoint-paths, plan-disjoint-sound]
    max_revisions: 3
  delivery_gate:
    when: after_each_delivery
    members: [judge-1]
    verdict_policy: revise_until_clean
    verdict_source: judge-1
    criteria:
      - plan-packages
      - disjoint-paths
      - report-schema
      - worktrees-cleaned
      - merges-complete
    max_revisions: 3

loop_control:
  max_iterations: 20
  budget:
    usd: 10.0
    tokens: 3000000
    wall_clock_min: 180
  no_progress:
    max_stalled_iterations: 2
    signals:
      - same write_paths conflict repeats
      - worktree add fails repeatedly without changing approach
      - PARALLEL-REPORT.md has no material change after revise
      - force-push to root branch proposed
    action: stop
  human_checkpoints: []
  stop_conditions:
    - delivery_gate passes clean on PARALLEL-REPORT.md
    - max_iterations reached
    - same blocker repeats for 2 iterations
    - any budget cap exceeded

execution:
  mode: in_session
  isolation: worktree
  side_effects:
    requires_approval: true
    duplicate_action_check: true
    notes: >
      Creates git worktrees and branches under
      /Users/galzafar/Documents/GitHub/homie-worktrees from
      feat/homie-spaces-images. Merges into feat/homie-spaces-images when AC
      passes; removes package worktrees after merge. Never force-push.
      Push/PR optional and requires explicit approval. If macOS git hangs,
      kill stale git check-ignore watchers before worktree operations.
      Root checkout already exists at
      /Users/galzafar/Documents/GitHub/homie-worktrees/homie-spaces-images
      (do not remove until loop complete / operator says so).

observability:
  state_file: state.json
  run_log: run-log.md
  checkpoint_granularity: gate

privacy:
  egress:
    - to: judge-1
      sends: [plan, parallel-report, package-diffs]
      redact: [".env", ".env.*", "secrets/**", "**/*.key", "**/secrets.auto.tfvars", "**/slack.env"]
      consent: required

workspace:
  dir: ./loop-workspace
  layout:
    - plan.md
    - "delivery-{n}.md"
    - "review-{n}.md"
    - PARALLEL-REPORT.md
    - state.json
    - run-log.md
