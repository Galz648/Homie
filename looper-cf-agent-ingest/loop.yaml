version: 1
meta:
  name: cf-agent-ingest
  description: >
    Parallelize Homie CF Agent ingest: apartment_listings schema, public
    auth-backed ingest API, Temporal fire-and-forget to Agent webhook, Slack
    on cleaned insert. Disjoint packages in git worktrees off feat/cf-agent-ingest.
  author: looper-pattern-library
  created: 2026-07-18

goal:
  statement: >
    Achieve the goal in inputs/goal.md for the repository at
    /Users/galzafar/Documents/GitHub/Homie by decomposing work into disjoint
    packages. Every package forks from root branch feat/cf-agent-ingest into
    its own git worktree under
    /Users/galzafar/Documents/GitHub/homie-worktrees/cf-agent-ingest, has
    non-overlapping write_paths within its parallel_group, and a verifiable
    ac_command. When a package's acceptance criteria pass, merge its branch
    into feat/cf-agent-ingest and remove its worktree. Produce
    PARALLEL-REPORT.md listing each package id, write_paths, AC command +
    exit evidence, merge commit, and worktree removal confirmation.
  context_sources:
    - file: ./inputs/goal.md
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie status -sb"
      timeout_sec: 60
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie branch --show-current"
      timeout_sec: 60
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie worktree list"
      timeout_sec: 60
    - cmd: "sed -n '1,120p' /Users/galzafar/Documents/GitHub/Homie/Homie-Website/src/db/schema.ts"
      timeout_sec: 30
    - cmd: "rg -n 'W3\\.|apartment|raw_facebook|ingest|Slack' /Users/galzafar/Documents/GitHub/Homie/docs/workstreams.md | head -80"
      timeout_sec: 30
  definition_of_done: >
    plan.md lists >=2 packages with id/deps/parallel_group/worktree/branch/
    write_paths/ac_command; same-group write_paths are disjoint;
    PARALLEL-REPORT.md records every package merged with AC pass evidence and
    worktree removed; feat/cf-agent-ingest contains all package changes; no
    open worktrees remain for this loop's package ids; no TBD placeholders;
    goal.md outcomes for apartment_listings, Bearer ingest, Temporal FF, and
    Slack-on-insert are covered by packages with programmatic ac_commands.
  anti_goals:
    - Editing overlapping write_paths in the same parallel_group without a plan revise
    - Force-pushing feat/cf-agent-ingest
    - Leaving worktrees around after a successful merge
    - Declaring a package done without a passing ac_command
    - Committing secrets or filling secrets.example with real values
    - Giving the Cloudflare Agent DATABASE_URL or Hyperdrive access
    - Writing cleaned/extracted fields into raw_facebook_posts instead of apartment_listings
  verification:
    - id: plan-packages
      type: programmatic
      description: plan.md packages have required fields
      check:
        - python
        - scripts/check-plan-packages.py
        - loop-workspace/plan.md
      expect: exit_zero
    - id: disjoint-paths
      type: programmatic
      description: write_paths disjoint within each parallel_group
      check:
        - python
        - scripts/check-disjoint-paths.py
        - loop-workspace/plan.md
      expect: exit_zero
    - id: report-schema
      type: programmatic
      description: PARALLEL-REPORT.md has per-package merge + AC evidence
      check:
        - python
        - scripts/check-parallel-report.py
        - loop-workspace/PARALLEL-REPORT.md
      expect: exit_zero
    - id: worktrees-cleaned
      type: programmatic
      description: No leftover worktrees for planned package ids
      check:
        - python
        - scripts/check-worktrees-cleaned.py
        - "/Users/galzafar/Documents/GitHub/Homie"
        - loop-workspace/plan.md
      expect: exit_zero
    - id: plan-disjoint-sound
      type: judge
      rubric: >
        Judge plan.md against inputs/goal.md. Every package must be necessary
        for the goal or explicitly deferred; write_paths within each
        parallel_group must be plausibly non-interfering (no shared mutable
        files); deps must not create cycles; each ac_command must actually
        verify that package's outcome (prefer exit_zero scripts/tests, not
        vibes). Must cover: apartment_listings Drizzle+migration; public
        Bearer-auth ingest writing apartment_listings; Temporal FF activity
        to CF Agent; Agent callback contract without DB; Slack on cleaned
        insert. Verdict revise if packages are fake splits, AC is vibes-only,
        Agent is given DB access, or root branch / worktree protocol is missing.
    - id: merges-complete
      type: judge
      rubric: >
        Judge PARALLEL-REPORT.md and git reality on feat/cf-agent-ingest.
        Every planned package that was not explicitly cancelled must show AC
        pass evidence, a merge commit (or ff) onto feat/cf-agent-ingest, and
        worktree removal. Verdict revise if merges are missing, AC was
        skipped, or worktrees still exist for package ids.

host:
  cli: claude
  model: default
  invoke: ["claude", "-p"]
  timeout_sec: 1800

council:
  - id: judge-1
    role: judge
    cli: claude
    model: default
    invoke: ["claude", "-p"]
    timeout_sec: 600
    scope: [plan, delivery]
    local: false

gates:
  plan_gate:
    when: after_plan
    members: [judge-1]
    verdict_policy: revise_until_clean
    verdict_source: judge-1
    criteria: [plan-packages, disjoint-paths, plan-disjoint-sound]
    max_revisions: 3
  delivery_gate:
    when: after_each_delivery
    members: [judge-1]
    verdict_policy: revise_until_clean
    verdict_source: judge-1
    criteria:
      - plan-packages
      - disjoint-paths
      - report-schema
      - worktrees-cleaned
      - merges-complete
    max_revisions: 3

loop_control:
  max_iterations: 20
  budget:
    usd: 10.0
    tokens: 3000000
    wall_clock_min: 180
  no_progress:
    max_stalled_iterations: 2
    signals:
      - same write_paths conflict repeats
      - worktree add fails repeatedly without changing approach
      - PARALLEL-REPORT.md has no material change after revise
      - force-push to root branch proposed
      - Agent DATABASE_URL or Hyperdrive proposed
    action: stop
  human_checkpoints: []
  stop_conditions:
    - delivery_gate passes clean on PARALLEL-REPORT.md
    - max_iterations reached
    - same blocker repeats for 2 iterations
    - any budget cap exceeded

execution:
  mode: in_session
  isolation: worktree
  side_effects:
    requires_approval: true
    duplicate_action_check: true
    notes: >
      Creates git worktrees and branches under
      /Users/galzafar/Documents/GitHub/homie-worktrees/cf-agent-ingest from
      feat/cf-agent-ingest. Merges into feat/cf-agent-ingest when AC passes;
      removes worktrees after merge. Never force-push. Push/PR optional and
      requires explicit approval. If macOS git hangs, kill stale git
      check-ignore watchers before worktree operations. Create
      feat/cf-agent-ingest from current staging tip before first package if
      the branch does not exist yet.

observability:
  state_file: state.json
  run_log: run-log.md
  checkpoint_granularity: gate

privacy:
  egress:
    - to: judge-1
      sends: [plan, parallel-report, package-diffs]
      redact: [".env", ".env.*", "secrets/**", "**/*.key", "**/secrets.auto.tfvars"]
      consent: required

workspace:
  dir: ./loop-workspace
  layout:
    - plan.md
    - "delivery-{n}.md"
    - "review-{n}.md"
    - PARALLEL-REPORT.md
    - state.json
    - run-log.md
