version: 1
meta:
  name: homie-gitops-cd
  description: >
    Close Homie GitOps CD gaps (assert-pin, trigger-scrape, pin-from-build,
    migrate PreSync, docs) via disjoint worktree packages off staging with
    verifiable ACs — no kubectl set image / overlay bypass.
  author: looper-homie
  created: 2026-07-18
  template: parallelization

goal:
  statement: >
    Achieve the goal in inputs/goal.md for the repository at
    /Users/galzafar/Documents/GitHub/Homie by decomposing work into disjoint
    packages. Every package forks from root branch staging into its own git
    worktree under /Users/galzafar/Documents/GitHub/homie-worktrees, has
    non-overlapping write_paths within its parallel_group, and a verifiable
    ac_command. When a package's acceptance criteria pass, merge its branch
    into staging and remove its worktree. Produce PARALLEL-REPORT.md listing
    each package id, write_paths, AC command + exit evidence, merge commit,
    and worktree removal confirmation. Honor
    .cursor/rules/no-manual-cluster-mutation.mdc throughout.
  context_sources:
    - file: ./inputs/goal.md
    - file: ./inputs/rules/no-manual-cluster-mutation.mdc
    - file: ./inputs/rules/gitops-source-of-truth.mdc
    - file: ./inputs/rules/macos-git-slowness.mdc
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie status -sb"
      timeout_sec: 60
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie branch --show-current"
      timeout_sec: 60
    - cmd: "git -C /Users/galzafar/Documents/GitHub/Homie worktree list"
      timeout_sec: 60
  definition_of_done: >
    plan.md lists >=2 packages with id/deps/parallel_group/worktree/branch/
    write_paths/ac_command; same-group write_paths are disjoint;
    PARALLEL-REPORT.md records every package merged with AC pass evidence and
    worktree removed; staging contains all package changes; no open worktrees
    remain for this loop's package ids; no TBD placeholders; no package solved
    desired-state via kubectl set image or apply -k of staging/production.
  anti_goals:
    - Editing overlapping write_paths in the same parallel_group without a plan revise
    - Force-pushing staging
    - Leaving worktrees around after a successful merge
    - Declaring a package done without a passing ac_command
    - Committing secrets or filling secrets.example with real values
    - kubectl set image / kubectl apply -k staging|production overlays as a fix
    - Creating worktrees while Cursor git check-ignore watchers hold the index lock
  verification:
    - id: plan-packages
      type: programmatic
      description: plan.md packages have required fields
      check:
        - python3
        - scripts/check-plan-packages.py
        - loop-workspace/plan.md
      expect: exit_zero
    - id: disjoint-paths
      type: programmatic
      description: write_paths disjoint within each parallel_group
      check:
        - python3
        - scripts/check-disjoint-paths.py
        - loop-workspace/plan.md
      expect: exit_zero
    - id: report-schema
      type: programmatic
      description: PARALLEL-REPORT.md has per-package merge + AC evidence
      check:
        - python3
        - scripts/check-parallel-report.py
        - loop-workspace/PARALLEL-REPORT.md
      expect: exit_zero
    - id: worktrees-cleaned
      type: programmatic
      description: No leftover worktrees for planned package ids
      check:
        - python3
        - scripts/check-worktrees-cleaned.py
        - "/Users/galzafar/Documents/GitHub/Homie"
        - loop-workspace/plan.md
      expect: exit_zero
    - id: no-manual-mutation-in-report
      type: programmatic
      description: PARALLEL-REPORT must not claim set-image / apply -k as AC
      check:
        - python3
        - scripts/check-no-manual-mutation.py
        - loop-workspace/PARALLEL-REPORT.md
      expect: exit_zero
    - id: plan-disjoint-sound
      type: judge
      rubric: >
        Judge plan.md against inputs/goal.md. Every package must be necessary
        for the goal or explicitly deferred; write_paths within each
        parallel_group must be plausibly non-interfering; deps must not create
        cycles; each ac_command must verify that package's outcome. Verdict
        revise if packages are fake splits, AC is vibes-only, pin-from-build
        skips deploy-key scaffold, or the plan relies on kubectl set image.
    - id: merges-complete
      type: judge
      rubric: >
        Judge PARALLEL-REPORT.md and git reality on staging. Every planned
        package not cancelled must show AC pass evidence, merge onto staging,
        and worktree removal. Verdict revise if merges missing, AC skipped,
        worktrees remain, or report celebrates manual cluster mutation.

host:
  cli: claude
  model: default
  invoke: ["claude", "-p"]
  timeout_sec: 1800

council:
  - id: judge-1
    role: judge
    cli: claude
    model: default
    invoke: ["claude", "-p"]
    timeout_sec: 600
    scope: [plan, delivery]
    local: false

gates:
  plan_gate:
    when: after_plan
    members: [judge-1]
    verdict_policy: revise_until_clean
    verdict_source: judge-1
    criteria: [plan-packages, disjoint-paths, plan-disjoint-sound]
    max_revisions: 3
  delivery_gate:
    when: after_each_delivery
    members: [judge-1]
    verdict_policy: revise_until_clean
    verdict_source: judge-1
    criteria:
      - plan-packages
      - disjoint-paths
      - report-schema
      - worktrees-cleaned
      - no-manual-mutation-in-report
      - merges-complete
    max_revisions: 3

loop_control:
  max_iterations: 20
  budget:
    usd: 10.0
    tokens: 3000000
    wall_clock_min: 180
  no_progress:
    max_stalled_iterations: 2
    signals:
      - same write_paths conflict repeats
      - worktree add fails repeatedly without changing approach
      - PARALLEL-REPORT.md has no material change after revise
      - force-push to root branch proposed
      - kubectl set image proposed as package solution
    action: stop
  human_checkpoints:
    - "After plan_gate: confirm package write_paths + deploy-key approach for pin-from-build before worktrees"
    - "Before first worktree: pkill git check-ignore watchers; abort if worktree add hangs (macos-git-slowness)"
  stop_conditions:
    - delivery_gate passes clean on PARALLEL-REPORT.md
    - max_iterations reached
    - same blocker repeats for 2 iterations
    - any budget cap exceeded

execution:
  mode: in_session
  isolation: worktree
  side_effects:
    requires_approval: true
    duplicate_action_check: true
    notes: >
      Creates git worktrees and branches under
      /Users/galzafar/Documents/GitHub/homie-worktrees from staging. Merges
      into staging when AC passes; removes worktrees after merge. Never
      force-push. Push/PR optional and requires explicit approval. Before any
      worktree add: pkill -f 'git.*check-ignore' and rm -f .git/index.lock.
      If worktree add hangs >60s, stop and ask human (do not set image).
      Desired-state changes only via git commits on package branches.

observability:
  state_file: state.json
  run_log: run-log.md
  checkpoint_granularity: gate

privacy:
  egress:
    - to: judge-1
      sends: [plan, parallel-report, package-diffs]
      redact: [".env", ".env.*", "secrets/**", "**/*.key", "**/secrets.auto.tfvars", "**/facebook_state.json"]
      consent: required

workspace:
  dir: ./loop-workspace
  layout:
    - plan.md
    - "delivery-{n}.md"
    - "review-{n}.md"
    - PARALLEL-REPORT.md
    - state.json
    - run-log.md
