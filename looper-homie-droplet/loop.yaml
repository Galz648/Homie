version: 1
meta:
  name: homie-do-k3s-droplet
  description: >
    DigitalOcean single-node k3s for Homie: terraform apply s-4vcpu-8gb,
    full monitoring + Argo CD + Argo Workflows, clinic-shaped staging CI
    with facebook-mock and a 1m staging-branch poller (pull model).
  created: 2026-07-18

goal:
  statement: >
    Provision Homie’s DigitalOcean single-node k3s droplet via
    infra/terraform/stacks/k3s (size s-4vcpu-8gb, region fra1, name
    homie-k3s) under DO project Homie (3ff485b0-8b3e-4f09-8798-079d56ecc498).
    Fetch kubeconfig to ~/.kube/homie-k3s.yaml and kubectl context
    homie-k3s-droplet. Install full monitoring (Prometheus + Grafana + Loki +
    Alloy), Argo CD, Argo Workflows, and ci-lane. Adapt clinic’s staging CI
    structure: base facebook-mock, staging overlay wiring, WorkflowTemplate
    homie-ci-staging (mocks Facebook external service), and a 1-minute
    CronJob that polls GitHub branch staging tip and submits that template
    on SHA change. Cluster pulls GitHub (read-only PAT in-cluster); do not
    use HOMIE_K3S_KUBECONFIG / GHA→kubectl for CI submit. Leave droplet
    running; document teardown only. terraform apply only after explicit
    operator approval of plan.
  definition_of_done: >
    (1) loop-workspace/plan.md lists packages with
    id/deps/parallel_group/worktree/ac_command; (2) TF secrets files filled
    out-of-band and terraform plan approved then applied; (3) droplet
    assigned to Homie project; (4) kubectl --context homie-k3s-droplet sees
    Ready node; (5) full monitoring + argocd + argo Homie releases have
    Ready pods (prometheus present); (6) facebook-mock + staging overlay
    structure present (clinic shape, Homie-named); (7) WorkflowTemplate
    homie-ci-staging + staging-poll CronJob present; (8) poller or manual
    tip-change proves a staging CI Workflow runs against facebook-mock;
    (9) no GHA kubeconfig CI submit path required; (10) operator signoff;
    (11) state.json stage=chapter_done.
  context_sources:
    - file: loop-workspace/inputs/goal-locked.md
    - file: loop-workspace/inputs/clinic-ci-pull-notes.md
    - file: loop-workspace/inputs/repo-pointers.md
    - file: README.md
  anti_goals:
    - Sharing clinic’s Slack workspace or clinic DO droplet as Homie’s home
    - Committing secrets, Slack tokens, kubeconfigs, or filled secrets.auto.tfvars
    - GHA submit via HOMIE_K3S_KUBECONFIG as primary CI (pull model only)
    - Lite-only monitoring as the droplet target (full stack required)
    - Building the real Facebook scraper product (W6) beyond mock + CI shape
    - terraform apply without explicit operator plan approval
    - Destroying the droplet at end of loop (leave running; docs teardown only)
    - Commit/push without explicit operator approval
  verification:
    - id: plan-approved
      type: human
      prompt: >
        Operator approved loop-workspace/plan.md: DO s-4vcpu-8gb, full
        monitoring, clinic-shaped facebook-mock + staging CI + 1m staging
        poller, no GHA kubeconfig CI.

    - id: plan-packages
      type: programmatic
      description: plan.md has packages with id/deps/parallel_group/worktree/ac_command
      check:
        - python3
        - looper-homie-droplet/scripts/check-plan-packages.py
      expect: exit_zero

    - id: tf-secrets-ready
      type: human
      prompt: >
        Operator confirms backend.hcl, terraform.tfvars, secrets.auto.tfvars
        (Tailscale), DIGITALOCEAN_TOKEN, and Spaces creds are ready out-of-band
        (never committed).

    - id: tf-plan-approved
      type: human
      prompt: >
        Operator reviewed terraform plan for stacks/k3s and explicitly approved apply.

    - id: droplet-in-project
      type: programmatic
      description: Homie-named droplet exists and is assigned to Homie DO project
      check:
        - python3
        - looper-homie-droplet/scripts/check-droplet-in-project.py
      expect: exit_zero

    - id: k3s-ready
      type: programmatic
      description: kubectl context homie-k3s-droplet has Ready node
      check:
        - python3
        - looper-homie-droplet/scripts/check-k3s-ready.py
      expect: exit_zero

    - id: platform-up
      type: programmatic
      description: monitoring (incl prometheus), argocd, argo have Ready pods
      check:
        - python3
        - looper-homie-droplet/scripts/check-platform-up.py
      expect: exit_zero

    - id: staging-ci-tree
      type: programmatic
      description: facebook-mock + homie-ci-staging + staging-poll artifacts present
      check:
        - python3
        - looper-homie-droplet/scripts/check-staging-ci-tree.py
      expect: exit_zero

    - id: staging-ci-smoke
      type: programmatic
      description: A staging-CI Workflow reached Succeeded (poll or manual submit)
      check:
        - python3
        - looper-homie-droplet/scripts/check-staging-ci-smoke.py
      expect: exit_zero

    - id: no-gha-kubeconfig-ci
      type: programmatic
      description: Primary CI docs/templates assert pull model, not GHA kubeconfig
      check:
        - python3
        - looper-homie-droplet/scripts/check-no-gha-kubeconfig-ci.py
      expect: exit_zero

    - id: operator-signoff
      type: human
      prompt: >
        Operator confirms droplet is Homie remote home: full monitoring, Argo,
        staging poller + facebook-mock CI shape, kubeconfig local-only, droplet left running.

host:
  cli: cursor-session
  model: in-session
  invoke: ["cursor-agent"]
  timeout_sec: 1800
  tools: [terminal, file]
  notes: >
    Run in this Cursor session via RUN_IN_SESSION.md. Human-only council —
    no cross-vendor model egress. DO apply and secret creation need operator.

council: []

gates:
  plan_gate:
    when: after_plan
    members: []
    verdict_policy: revise_until_clean
    verdict_source: human
    max_revisions: 3
    criteria:
      - plan-approved
      - plan-packages
  delivery_gate:
    when: after_each_delivery
    members: []
    verdict_policy: revise_until_clean
    verdict_source: human
    max_revisions: 3
    criteria:
      - tf-secrets-ready
      - tf-plan-approved
      - droplet-in-project
      - k3s-ready
      - platform-up
      - staging-ci-tree
      - staging-ci-smoke
      - no-gha-kubeconfig-ci
      - operator-signoff

loop_control:
  max_iterations: 20
  budget:
    wall_clock_min: 360
  no_progress:
    max_stalled_iterations: 2
    signals:
      - same delivery gate failure repeats
      - proposal to use HOMIE_K3S_KUBECONFIG as primary CI
      - proposal to share clinic droplet or Slack workspace
      - terraform apply without plan approval
      - delivery artifact has no material change
    action: stop
  stop_conditions:
    - All delivery criteria pass and state.json stage=chapter_done
    - Same blocker twice within no-progress window → stop and ask human
    - max_iterations or wall_clock exceeded → stop with partial state

execution:
  mode: in_session
  isolation: current_workspace
  side_effects:
    require_approval: true
    notes: >
      Repo edits under infra/, looper-homie-droplet/, and CI templates are in
      scope after plan approval. terraform apply, doctl project assign, writing
      ~/.kube/homie-k3s.yaml, helm installs on the droplet, and creating
      github-ci-read / Slack cluster secrets require explicit operator approval
      at each step. Commit/push require explicit approval. Do not destroy the
      droplet. Do not reuse clinic cloud resources.

observability:
  run_log: looper-homie-droplet/loop-workspace/run-log.md
  state_path: looper-homie-droplet/loop-workspace/state.json

privacy:
  redaction_globs:
    - .env
    - .env.*
    - secrets/**
    - "**/*.key"
    - "**/secrets.auto.tfvars"
    - "**/backend.hcl"
    - "**/*secret*.yaml"
    - "!**/*.example.yaml"
    - "!**/*.tfvars.example"
    - "!**/*.hcl.example"
    - "**/homie-k3s.yaml"
    - "**/.kube/**"

workspace:
  dir: ./loop-workspace
  layout:
    - plan.md
    - delivery-{n}.md
    - state.json
    - run-log.md
