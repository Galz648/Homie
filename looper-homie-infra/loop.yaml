version: 1
meta:
  name: homie-local-k3s-infra
  description: >
    Local k3s platform + CI plumbing for Homie on Docker Desktop (k3d):
    monitoring, Argo CD, Argo Workflows, ci-lane, thin argo-ci GHA under infra/.
    Cloudflare/Alchemy deploy retired on the infra branch.
  created: 2026-07-18

goal:
  statement: >
    Stand up Homie-named local k3s platform infrastructure on Docker Desktop
    (k3d / local k3s). Produce infra/SPEC.md and an operator README, scaffold
    infra/terraform/stacks/k3s (stub only — do not apply) and
    infra/k3s/{base stub, overlays/{local,staging,production}, monitoring,
    argocd, platform/argo-workflows, platform/ci-lane}. Add Homie-named
    WorkflowTemplate stubs and a thin root .github/workflows/argo-ci.yml that
    submits Workflows (local k3d context first). Install monitoring, Argo CD,
    and Argo Workflows via Homie-named install.sh scripts. Do not restore
    Cloudflare/Alchemy deploy. Do not containerize product code. Do not
    terraform-apply DigitalOcean in this loop.
  definition_of_done: >
    (1) infra/SPEC.md covers target shape, ownership, lanes, phase-1 platform
    + CI plumbing, IaC-first secrets, success criteria, CF deploy retired;
    (2) infra/README.md is the operator map (k3d up, install order, port-forwards, CI);
    (3) loop-workspace/plan.md lists packages with id/deps/parallel_group/worktree/ac_command;
    (4) infra tree exists with TF stub + base stub + three overlays + monitoring +
    argocd + argo-workflows + ci-lane;
    (5) Homie WorkflowTemplate stubs + .github/workflows/argo-ci.yml present;
    (6) local k3s/k3d node Ready; (7) monitoring, argocd, and argo namespaces have
    Ready pods from Homie-named releases; (8) no clinic-* release names remain in
    Homie packs; (9) operator human signoff; (10) state.json stage=chapter_done.
  context_sources:
    - file: loop-workspace/inputs/homie-infra-plan.md
    - file: loop-workspace/inputs/clinic-adaptation-notes.md
    - file: README.md
  anti_goals:
    - Restoring Cloudflare / Alchemy deploy or Homie-Website GHA preview/publish
    - Adding Homie product features or Facebook scraper (does not exist yet)
    - Containerizing Homie-Website for this loop
    - terraform apply or DigitalOcean droplet create
    - Committing secrets, Slack tokens, or filled secrets.auto.tfvars
    - Commit/push without explicit operator approval
    - Shared cluster with clinic-reminder-system
    - Copying clinic domain workloads (WAHA, Temporal, clinic-api)
    - Wiring Argo CI to run real Homie app test suites before they exist
  verification:
    - id: plan-approved
      type: human
      prompt: >
        Operator approved infra/SPEC.md and loop-workspace/plan.md: local k3s
        platform + CI plumbing, Homie-named packs, CF deploy stays retired, no DO apply.

    - id: ci-plumbing
      type: programmatic
      description: ci-lane + WorkflowTemplate stubs + argo-ci.yml present
      check:
        - python3
        - looper-homie-infra/scripts/check-ci-plumbing.py
      expect: exit_zero

    - id: plan-packages
      type: programmatic
      description: plan.md has packages with id/deps/parallel_group/worktree/ac_command
      check:
        - python3
        - looper-homie-infra/scripts/check-plan-packages.py
      expect: exit_zero

    - id: spec-sections
      type: programmatic
      description: infra/SPEC.md has required headings
      check:
        - python3
        - looper-homie-infra/scripts/check-spec-sections.py
      expect: exit_zero

    - id: tree-present
      type: programmatic
      description: Required infra/ paths exist
      check:
        - python3
        - looper-homie-infra/scripts/check-tree-present.py
      expect: exit_zero

    - id: homie-named
      type: programmatic
      description: Platform packs use Homie release names, not clinic-*
      check:
        - python3
        - looper-homie-infra/scripts/check-homie-named.py
      expect: exit_zero

    - id: install-scripts
      type: programmatic
      description: Three install.sh scripts exist and default to Homie releases
      check:
        - python3
        - looper-homie-infra/scripts/check-install-scripts.py
      expect: exit_zero

    - id: k3s-ready
      type: programmatic
      description: Local kubectl reports at least one Ready node
      check:
        - python3
        - looper-homie-infra/scripts/check-k3s-ready.py
      expect: exit_zero

    - id: platform-up
      type: programmatic
      description: monitoring, argocd, argo namespaces have Ready pods
      check:
        - python3
        - looper-homie-infra/scripts/check-platform-up.py
      expect: exit_zero

    - id: operator-signoff
      type: human
      prompt: >
        Operator confirms local platform packs install cleanly, SPEC/README are
        accurate, app code was untouched, and no DigitalOcean apply was done.

host:
  cli: claude-code
  model: in-session
  invoke: ["claude"]
  timeout_sec: 1800
  tools: [terminal, file]
  notes: >
    Run in this Cursor session via RUN_IN_SESSION.md. Human-only council —
    no cross-vendor model egress.

council: []

gates:
  plan_gate:
    when: after_plan
    members: []
    verdict_policy: revise_until_clean
    verdict_source: human
    max_revisions: 3
    criteria:
      - plan-approved
      - plan-packages
      - spec-sections
  delivery_gate:
    when: after_each_delivery
    members: []
    verdict_policy: revise_until_clean
    verdict_source: human
    max_revisions: 3
    criteria:
      - tree-present
      - homie-named
      - install-scripts
      - ci-plumbing
      - k3s-ready
      - platform-up
      - operator-signoff

loop_control:
  max_iterations: 15
  budget:
    wall_clock_min: 240
  no_progress:
    max_stalled_iterations: 2
    signals:
      - same delivery gate failure repeats
      - proposal to containerize Homie-Website or Alchemy
      - terraform apply / DO droplet proposed as required for this loop
      - clinic-* release names left in Homie packs
      - delivery artifact has no material change
    action: stop
  stop_conditions:
    - All delivery criteria pass and state.json stage=chapter_done
    - Same blocker twice within no-progress window → stop and ask human
    - max_iterations or wall_clock exceeded → stop with partial state

execution:
  mode: in_session
  isolation: current_workspace
  side_effects:
    require_approval: true
    notes: >
      Repo edits under infra/ and looper-homie-infra/ are in scope after plan
      approval. Creating/starting local k3d and helm installs need one operator
      approval at that step. Commit, push, and any terraform apply / cloud
      create require explicit approval. Do not modify Homie-Website or app paths.

observability:
  run_log: looper-homie-infra/loop-workspace/run-log.md
  state_path: looper-homie-infra/loop-workspace/state.json

privacy:
  redaction_globs:
    - .env
    - .env.*
    - secrets/**
    - "**/*.key"
    - "**/secrets.auto.tfvars"
    - "**/*secret*.yaml"
    - "!**/*.example.yaml"
    - "!**/*.tfvars.example"

workspace:
  dir: ./loop-workspace
  layout:
    - plan.md
    - delivery-{n}.md
    - state.json
    - run-log.md
