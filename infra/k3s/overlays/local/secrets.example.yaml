# Example only — do NOT commit real values. Apply out-of-band.
apiVersion: v1
kind: Secret
metadata:
  name: homie-lane-secrets
  namespace: homie
  labels:
    app.kubernetes.io/part-of: homie
    homie.io/lane: local
type: Opaque
stringData:
  EXAMPLE_TOKEN: REPLACE_ME
---
# Homie ingest Bearer token (Agent → Homie). Apply out-of-band:
#   kubectl -n homie create secret generic homie-ingest \
#     --from-literal=HOMIE_INGEST_BEARER_TOKEN=REPLACE_ME
apiVersion: v1
kind: Secret
metadata:
  name: homie-ingest
  namespace: homie
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: ingest
    homie.io/lane: local
type: Opaque
stringData:
  HOMIE_INGEST_BEARER_TOKEN: REPLACE_ME
