apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homie-staging
resources:
  - namespace.yaml
  - ../../base/facebook-mock
  - ../../base/scrape-temporal
  - ../../base/fb-scrape-worker
patches:
  - path: patch-temporal-svc-clusterip.yaml
  - path: patch-temporal-ui-svc-clusterip.yaml
# Image pin stub — future clinic-build-images equivalent rewrites newTag to staging-<sha>.
# Until Zot exists, Sync expects ImagePullBackOff unless the node has fb-scrape-worker:local.
images:
  - name: fb-scrape-worker
    newName: zot.local:5000/homie/fb-scrape-worker
    newTag: staging
