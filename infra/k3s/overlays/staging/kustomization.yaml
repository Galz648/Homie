apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homie-staging
resources:
  - namespace.yaml
  - ../../base/facebook-mock
  - ../../base/scrape-postgres
  - ../../base/scrape-temporal
  - ../../base/scrape-db-migrate
  - ../../base/fb-scrape-worker
patches:
  - path: patch-temporal-svc-clusterip.yaml
  - path: patch-temporal-ui-svc-clusterip.yaml
  - path: patch-postgres-svc-clusterip.yaml
  - path: patch-scrape-db-migrate-env.yaml
  # Explicit image patch — ensures Argo desired state matches pin even if
  # images: transform is missed by a reconciler cache edge case.
  - path: patch-fb-scrape-worker-image.yaml
# Zot — in-cluster build pins worker to staging-989c1c4 (Argo OutOfSync until Sync).
images:
  - name: fb-scrape-worker
    newName: zot.local:5000/homie/fb-scrape-worker
    newTag: staging-989c1c4
