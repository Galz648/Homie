apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homie-staging
resources:
  - namespace.yaml
  - ../../base/facebook-mock
  - ../../base/scrape-postgres
  - ../../base/scrape-temporal
  - ../../base/fb-scrape-worker
patches:
  - path: patch-temporal-svc-clusterip.yaml
  - path: patch-temporal-ui-svc-clusterip.yaml
  - path: patch-postgres-svc-clusterip.yaml
# Zot — in-cluster build pins worker image (Argo OutOfSync until Sync).
images:
  - name: fb-scrape-worker
    newName: zot.local:5000/homie/fb-scrape-worker
    newTag: staging
