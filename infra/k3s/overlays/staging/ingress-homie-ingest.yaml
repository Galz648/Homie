# Public HTTP entry for CF Agent → Homie ingest (Traefik).
# Path-only rule so callbacks can use http://<droplet-ip>/ without DNS yet.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homie-ingest
  labels:
    app.kubernetes.io/name: homie-ingest
    app.kubernetes.io/part-of: homie
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homie-ingest
                port:
                  number: 8080
