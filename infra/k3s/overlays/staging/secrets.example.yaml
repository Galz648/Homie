# Example only — do NOT commit real values.
#
# Required for fb-scrape-worker on staging:
#   ./scripts/apply-homie-database-secret.sh staging   # if present
#   kubectl -n homie-staging create secret generic facebook-session \
#     --from-file=facebook_state.json="$HOME/.config/homie/facebook_state.json"
# Spaces (optional):
#   ./scripts/apply-homie-spaces-secret.sh staging
---
apiVersion: v1
kind: Secret
metadata:
  name: homie-database
  namespace: homie-staging
  labels:
    app.kubernetes.io/part-of: homie
    homie.io/lane: staging
type: Opaque
stringData:
  DATABASE_URL: postgresql://homie:homie@REPLACE_HOST:5432/homie
  DIRECT_URL: postgresql://homie:homie@REPLACE_HOST:5432/homie
---
apiVersion: v1
kind: Secret
metadata:
  name: facebook-session
  namespace: homie-staging
  labels:
    app.kubernetes.io/part-of: homie
    homie.io/lane: staging
type: Opaque
stringData:
  facebook_state.json: |
    {"REPLACE": "playwright storage state — never commit real session"}
---
apiVersion: v1
kind: Secret
metadata:
  name: homie-spaces-images
  namespace: homie-staging
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: spaces-images
    homie.io/lane: staging
type: Opaque
stringData:
  HOMIE_IMAGE_UPLOAD_MODE: spaces
  HOMIE_IMAGES_BUCKET: homie-k3s-images-staging
  HOMIE_IMAGES_BASE_URL: https://homie-k3s-images-staging.fra1.digitaloceanspaces.com
  HOMIE_SPACES_ENDPOINT: https://fra1.digitaloceanspaces.com
  HOMIE_SPACES_REGION: fra1
  HOMIE_SPACES_KEY: REPLACE_ME
  HOMIE_SPACES_SECRET: REPLACE_ME
---
# Homie ingest Bearer token (Agent → Homie). Apply:
#   ./scripts/apply-homie-ingest-secret.sh staging
# Local dual-home (~/.config/homie/ingest.env):
#   HOMIE_INGEST_BEARER_TOKEN
#   HOMIE_INGEST_URL   # public base URL Agent POSTs to (…/ingest/listings)
apiVersion: v1
kind: Secret
metadata:
  name: homie-ingest
  namespace: homie-staging
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: ingest
    homie.io/lane: staging
type: Opaque
stringData:
  HOMIE_INGEST_BEARER_TOKEN: REPLACE_ME
---
# CF Agent webhook (Temporal → Agent). Apply:
#   KUBECONFIG=~/.kube/homie-k3s.yaml ./scripts/apply-homie-cf-agent-webhook-secret.sh staging
# Local dual-home (~/.config/homie/cf-agent-webhook.env):
#   HOMIE_CF_AGENT_WEBHOOK_SECRET
#   HOMIE_CF_AGENT_WEBHOOK_AUTH=bearer
#   HOMIE_CF_AGENT_WEBHOOK_URL   # e.g. https://homie-listing-extract.<subdomain>.workers.dev
# Prefer ConfigMap patch for URL (non-secret): overlays/staging/patch-fb-scrape-worker-agent-webhook.yaml
apiVersion: v1
kind: Secret
metadata:
  name: homie-cf-agent-webhook
  namespace: homie-staging
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: cf-agent-webhook
    homie.io/lane: staging
type: Opaque
stringData:
  HOMIE_CF_AGENT_WEBHOOK_SECRET: REPLACE_ME
  HOMIE_CF_AGENT_WEBHOOK_AUTH: bearer
