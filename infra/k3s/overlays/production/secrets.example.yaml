# Example only — do NOT commit real values.
# Apply live secrets with:
#   KUBECONFIG=~/.kube/homie-k3s.yaml ./scripts/apply-homie-spaces-secret.sh production
#   KUBECONFIG=~/.kube/homie-k3s.yaml ./scripts/apply-homie-database-secret.sh production
#
# Production DB MUST be Supabase (repo .env → ~/.config/homie/database.production.env).
# Scrape/API workers should envFrom both Secrets when deployed.
---
apiVersion: v1
kind: Secret
metadata:
  name: homie-spaces-images
  namespace: homie-production
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: spaces-images
    homie.io/lane: production
type: Opaque
stringData:
  HOMIE_IMAGE_UPLOAD_MODE: spaces
  HOMIE_IMAGES_BUCKET: homie-k3s-images-production
  HOMIE_IMAGES_BASE_URL: https://homie-k3s-images-production.fra1.digitaloceanspaces.com
  HOMIE_SPACES_ENDPOINT: https://fra1.digitaloceanspaces.com
  HOMIE_SPACES_REGION: fra1
  HOMIE_SPACES_KEY: REPLACE_ME
  HOMIE_SPACES_SECRET: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: homie-database
  namespace: homie-production
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: database
    homie.io/lane: production
type: Opaque
stringData:
  # Pooled runtime URL (Supavisor :6543 + pgbouncer=true)
  DATABASE_URL: "postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres?pgbouncer=true"
  # Direct URL for migrations (pooler :5432, no pgbouncer)
  DIRECT_URL: "postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres"
---
# Homie ingest Bearer token (Agent → Homie). Apply:
#   KUBECONFIG=~/.kube/homie-k3s.yaml ./scripts/apply-homie-ingest-secret.sh production
apiVersion: v1
kind: Secret
metadata:
  name: homie-ingest
  namespace: homie-production
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: ingest
    homie.io/lane: production
type: Opaque
stringData:
  HOMIE_INGEST_BEARER_TOKEN: REPLACE_ME
