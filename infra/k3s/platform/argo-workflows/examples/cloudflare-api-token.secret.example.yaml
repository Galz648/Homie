# Example only — do NOT commit real values.
#
# Cloudflare API token for Argo → wrangler deploy (listing-extract Agent).
# Token needs Workers Scripts Edit (and Account read) for the Homie CF account.
#
# Apply (droplet):
#   KUBECONFIG=~/.kube/homie-k3s.yaml \
#     ./scripts/apply-cloudflare-api-token-secret.sh
#
# Or:
#   kubectl -n argo create secret generic cloudflare-api-token \
#     --from-literal=CLOUDFLARE_API_TOKEN=REPLACE_ME \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Source file (gitignored): ~/.config/homie/cloudflare.env
#   CLOUDFLARE_API_TOKEN=...
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: argo
  labels:
    app.kubernetes.io/part-of: homie
    app.kubernetes.io/component: cf-agent
    homie.io/lane: platform
type: Opaque
stringData:
  CLOUDFLARE_API_TOKEN: REPLACE_ME
