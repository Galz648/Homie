# Example only — do NOT commit real keys.
# Create in-cluster:
#   kubectl -n argo create secret generic github-ci-ssh \
#     --from-file=id_ed25519=/path/to/deploy_key
#
# Deploy key needs write access to Galz648/Homie (staging branch) for
# chore(k3s): pin commits from homie-build-images pin-overlay step.
apiVersion: v1
kind: Secret
metadata:
  name: github-ci-ssh
  namespace: argo
  labels:
    app.kubernetes.io/part-of: homie
type: Opaque
stringData:
  id_ed25519: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_WITH_DEPLOY_KEY_OR_DELETE_THIS_FILE_FROM_APPLY
    -----END OPENSSH PRIVATE KEY-----
