# GitHub API poller — runs IN the cluster; cluster reaches api.github.com.
# Needs a read-only PAT in Secret argo/github-ci-read (key: token).
# Suspended until the secret exists — then: kubectl -n argo patch cronjob
#   homie-ci-staging-poll -p '{"spec":{"suspend":false}}'
apiVersion: batch/v1
kind: CronJob
metadata:
  name: homie-ci-staging-poll
  namespace: argo
  labels:
    app.kubernetes.io/part-of: homie
    homie.io/ci: pull
spec:
  suspend: true
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argo-workflow
          restartPolicy: OnFailure
          containers:
            - name: poll
              image: bitnami/kubectl:1.31
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-ci-read
                      key: token
                      optional: true
              command: [bash, -lc]
              args:
                - |
                  set -euo pipefail
                  if [[ -z "${GH_TOKEN:-}" ]]; then
                    echo "github-ci-read secret missing — leave CronJob suspended until set"
                    exit 0
                  fi
                  SHA=$(curl -fsSL \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    https://api.github.com/repos/Galz648/Homie/commits/staging \
                    | sed -n 's/.*"sha": "\([a-f0-9]\{40\}\)".*/\1/p' | head -1)
                  if [[ -z "$SHA" ]]; then
                    echo "failed to resolve staging tip"
                    exit 1
                  fi
                  echo "staging tip=$SHA"
                  LAST=$(kubectl -n argo get configmap homie-ci-last-sha -o jsonpath='{.data.sha}' 2>/dev/null || true)
                  if [[ "$SHA" == "$LAST" ]]; then
                    echo "no change"
                    exit 0
                  fi
                  kubectl -n argo create -f - <<EOF
                  apiVersion: argoproj.io/v1alpha1
                  kind: Workflow
                  metadata:
                    generateName: homie-ci-staging-
                    namespace: argo
                    labels:
                      homie.io/smoke: ci-staging
                      homie.io/trigger: staging-poll
                  spec:
                    workflowTemplateRef:
                      name: homie-ci-staging
                  EOF
                  kubectl -n argo create configmap homie-ci-last-sha --from-literal=sha="$SHA" -o yaml --dry-run=client \
                    | kubectl apply -f -
                  echo submitted for $SHA
