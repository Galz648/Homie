# Allow argo-workflow SA to find/exec the Temporal pod for homie-trigger-scrape.
# Apply: kubectl apply -f examples/ci-trigger-scrape-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: homie-trigger-scrape
  namespace: homie-staging
  labels:
    app.kubernetes.io/part-of: homie
    homie.io/smoke: trigger-scrape
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: homie-trigger-scrape
  namespace: homie-staging
  labels:
    app.kubernetes.io/part-of: homie
    homie.io/smoke: trigger-scrape
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: homie-trigger-scrape
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: argo
