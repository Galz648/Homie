apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: homie-ci-smoke
  namespace: argo
  labels:
    app.kubernetes.io/part-of: homie
    homie.io/ci: smoke
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  templates:
    - name: main
      container:
        image: busybox:1.36
        command: [sh, -c]
        args: ["echo homie-ci-smoke-ok && sleep 1"]
