# Temporal + Temporal Postgres + UI for local scrape e2e (W6a).
# Host Playwright worker talks to Temporal at 127.0.0.1:7233 via k3d LB port map.
apiVersion: v1
kind: Secret
metadata:
  name: scrape-temporal-db
  labels:
    app.kubernetes.io/name: scrape-temporal-db
    app.kubernetes.io/part-of: homie-scrape-e2e
type: Opaque
stringData:
  POSTGRES_USER: temporal
  POSTGRES_PASSWORD: temporal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrape-temporal-db
  labels:
    app.kubernetes.io/name: scrape-temporal-db
    app.kubernetes.io/part-of: homie-scrape-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrape-temporal-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrape-temporal-db
        app.kubernetes.io/part-of: homie-scrape-e2e
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: scrape-temporal-db
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scrape-temporal-db
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-temporal-db
  labels:
    app.kubernetes.io/name: scrape-temporal-db
spec:
  selector:
    app.kubernetes.io/name: scrape-temporal-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrape-temporal
  labels:
    app.kubernetes.io/name: scrape-temporal
    app.kubernetes.io/part-of: homie-scrape-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrape-temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrape-temporal
        app.kubernetes.io/part-of: homie-scrape-e2e
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.25.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 7233
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              value: temporal
            - name: POSTGRES_SEEDS
              value: scrape-temporal-db
            # Do NOT set DYNAMIC_CONFIG_FILE_PATH — missing file crashes auto-setup.
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-temporal
  labels:
    app.kubernetes.io/name: scrape-temporal
    app.kubernetes.io/part-of: homie-scrape-e2e
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: scrape-temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrape-temporal-ui
  labels:
    app.kubernetes.io/name: scrape-temporal-ui
    app.kubernetes.io/part-of: homie-scrape-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrape-temporal-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrape-temporal-ui
        app.kubernetes.io/part-of: homie-scrape-e2e
    spec:
      containers:
        - name: ui
          image: temporalio/ui:2.31.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: scrape-temporal:7233
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-temporal-ui
  labels:
    app.kubernetes.io/name: scrape-temporal-ui
    app.kubernetes.io/part-of: homie-scrape-e2e
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: scrape-temporal-ui
  ports:
    # Distinct LB port so it does not collide with other :8080 services.
    - name: http
      port: 8233
      targetPort: http
