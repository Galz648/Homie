# Overlay must set HOMIE_LANE + HOMIE_GIT_BRANCH (stagingâ†’staging, productionâ†’main).
# Same PreSync wave as the Job so env exists before migrate runs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scrape-db-migrate-env
  labels:
    app.kubernetes.io/name: scrape-db-migrate
    app.kubernetes.io/part-of: homie
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
data:
  HOMIE_LANE: unset
  HOMIE_GIT_BRANCH: unset
