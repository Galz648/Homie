# Homie app Postgres for local scrape e2e (W6a).
# Not for staging/prod — local overlay only.
apiVersion: v1
kind: Secret
metadata:
  name: scrape-postgres
  labels:
    app.kubernetes.io/name: scrape-postgres
    app.kubernetes.io/part-of: homie-scrape-e2e
type: Opaque
stringData:
  POSTGRES_USER: homie
  POSTGRES_PASSWORD: homie
  POSTGRES_DB: homie
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrape-postgres
  labels:
    app.kubernetes.io/name: scrape-postgres
    app.kubernetes.io/part-of: homie-scrape-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrape-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrape-postgres
        app.kubernetes.io/part-of: homie-scrape-e2e
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: scrape-postgres
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "homie", "-d", "homie"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "homie", "-d", "homie"]
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: scrape-postgres
  labels:
    app.kubernetes.io/name: scrape-postgres
    app.kubernetes.io/part-of: homie-scrape-e2e
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: scrape-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
