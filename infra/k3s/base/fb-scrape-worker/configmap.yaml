apiVersion: v1
kind: ConfigMap
metadata:
  name: fb-scrape-worker-env
  labels:
    app.kubernetes.io/name: fb-scrape-worker
    app.kubernetes.io/part-of: homie
data:
  TEMPORAL_ADDRESS: scrape-temporal:7233
  TEMPORAL_NAMESPACE: default
  HOMIE_FB_TASK_QUEUE: homie-fb-scrape
  HOMIE_FACEBOOK_STATE_PATH: /var/homie/facebook_state.json
  HOMIE_IMAGE_UPLOAD_MODE: spaces
  # Staging Slack channel resolution (see scrapers/facebook/README.md)
  # runtime-errors + raw-postings (#homie-raw-postings-staging) from Secret homie-slack
  HOMIE_LANE: staging
  HOMIE_SCRAPE_TZ: Asia/Jerusalem
  # Optional CF Agent fire-and-forget webhook (Temporal → Agent).
  # Leave empty / omit to no-op notify locally. Real URL per lane overlay.
  # HOMIE_CF_AGENT_WEBHOOK_SECRET must come from a Secret — never put here.
  HOMIE_CF_AGENT_WEBHOOK_URL: ""
  # Auth mode for Temporal → Agent: bearer (default) or hmac
  HOMIE_CF_AGENT_WEBHOOK_AUTH: bearer
