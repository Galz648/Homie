apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homie-workloads-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Galz648/Homie.git
    # Production GitOps + migrate Job clone from main (staging lane uses staging).
    targetRevision: main
    path: infra/k3s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: homie-production
  # Manual sync — do NOT apply this Application until capacity allows a prod lane.
  # GitOps syncs any overlay drift (not image-tags-only).
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences: []
