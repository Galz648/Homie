apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homie-workloads
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Galz648/Homie.git
    # Staging tip is the GitOps source for the staging lane (any overlay drift).
    targetRevision: staging
    path: infra/k3s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: homie-staging
  # Auto-sync staging tip → cluster (selfHeal undoes kubectl drift).
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences: []
