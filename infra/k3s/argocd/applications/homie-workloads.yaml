apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homie-workloads
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Galz648/Homie.git
    # Staging branch is the Argo sync source for the homie-staging lane.
    targetRevision: infra
    path: infra/k3s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: homie-staging
  # Manual sync until first Healthy + operator signoff.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences: []
