# Mirror of values-slack.yaml Grafana alerting rules (readable copy).
# Source of truth for Helm: values-slack.yaml → kube-prometheus-stack.grafana.alerting.rules.yaml
apiVersion: 1
groups:
  - orgId: 1
    name: k3s-node-health
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: k3s_node_memory_low
        title: NodeMemoryLow
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.15
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Droplet node free memory below 15% for 5m (k3s staging host).
        labels:
          severity: warning
          environment: k3s
