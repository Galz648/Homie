apiVersion: 1
policies:
  - orgId: 1
    receiver: Slack Grafana
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: Slack Temporal
        matchers:
          - grafana_folder = Temporal
        continue: false
