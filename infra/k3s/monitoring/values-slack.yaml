# Bot-token Slack overlay — Grafana + Temporal only.
#   ./install.sh --wait -f values.yaml -f values-slack.yaml
# Secret: scripts/apply-grafana-slack-secret.sh

kube-prometheus-stack:
  grafana:
    envFromSecret: grafana-slack
    alerting:
      contactpoints.yaml:
        apiVersion: 1
        contactPoints:
          - name: Slack Grafana
            receivers:
              - uid: slack-grafana-k3s
                type: slack
                settings:
                  token: $SLACK_BOT_TOKEN
                  recipient: $SLACK_CHANNEL_ID_GRAFANA
                  username: Grafana
                  icon_emoji: ":grafana:"
          - name: Slack Temporal
            receivers:
              - uid: slack-temporal-k3s
                type: slack
                settings:
                  token: $SLACK_BOT_TOKEN
                  recipient: $SLACK_TEMPORAL_CHANNEL_ID
                  username: Grafana
                  icon_emoji: ":hourglass_flowing_sand:"
      policies.yaml:
        apiVersion: 1
        policies:
          - orgId: 1
            receiver: Slack Grafana
            group_by:
              - grafana_folder
              - alertname
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - receiver: Slack Temporal
                matchers:
                  - grafana_folder = Temporal
                continue: false
      # Node memory — default receiver Slack Grafana (Infrastructure folder).
      rules.yaml:
        apiVersion: 1
        groups:
          - orgId: 1
            name: k3s-node-health
            folder: Infrastructure
            interval: 1m
            rules:
              - uid: k3s_node_memory_low
                title: NodeMemoryLow
                condition: C
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 300
                      to: 0
                    datasourceUid: prometheus
                    model:
                      editorMode: code
                      expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
                      instant: true
                      intervalMs: 1000
                      legendFormat: __auto
                      maxDataPoints: 43200
                      range: false
                      refId: A
                  - refId: B
                    datasourceUid: __expr__
                    model:
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: A
                      reducer: last
                      refId: B
                      type: reduce
                  - refId: C
                    datasourceUid: __expr__
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 0.15
                            type: lt
                          operator:
                            type: and
                          query:
                            params:
                              - C
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: __expr__
                      expression: B
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: C
                      type: threshold
                noDataState: NoData
                execErrState: Error
                for: 5m
                annotations:
                  summary: Droplet node free memory below 15% for 5m (k3s staging host).
                  description: >-
                    node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.15.
                    Check Homie + monitoring pods; staging alone should stay under ~8Gi.
                labels:
                  severity: warning
                  environment: k3s
